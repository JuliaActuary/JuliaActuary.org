<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 760" width="720" height="760"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Helvetica, Arial, sans-serif">
  <style type="text/css"><![CDATA[
    .title       { font-size: 22px; font-weight: 700; fill: #2A2A2A; }
    .subtitle    { font-size: 13px; font-style: italic; fill: #5A5A5A; }
    .header      { font-size: 16px; font-weight: 500; fill: #2A2A2A; }
    .clabel      { font-size: 18px; fill: #2A2A2A; }
    .percent     { font-size: 28px; font-weight: 700; fill: #2A2A2A; }
    .caption     { font-size: 14px; fill: #5A5A5A; }
    .actuarial   { fill: #4773AA; fill-opacity: 0.35; stroke: #2D5380; stroke-width: 2; }
    .quant       { fill: #D17A4A; fill-opacity: 0.35; stroke: #9C5532; stroke-width: 2; }
  ]]></style>

  <!-- Title block -->
  <text x="360" y="42" text-anchor="middle" class="title">Actuarial × quant capability overlap</text>
  <text x="360" y="64" text-anchor="middle" class="subtitle">How performance and expressiveness change the picture</text>

  <!-- ===================== Top Venn: 30% overlap ===================== -->
  <!-- Circles: r = 100, centers (270, 260) and (387, 260). d = 117 ⇒ ~30% overlap. -->
  <text x="360" y="118" text-anchor="middle" class="header">Traditional / low-performance actuarial engine</text>

  <circle cx="270" cy="260" r="100" class="actuarial"/>
  <circle cx="387" cy="260" r="100" class="quant"/>

  <text x="228" y="266" text-anchor="middle" class="clabel">Actuarial</text>
  <text x="428" y="266" text-anchor="middle" class="clabel">Quant</text>
  <text x="329" y="271" text-anchor="middle" class="percent">30%</text>

  <text x="360" y="408" text-anchor="middle" class="caption">≈ 30% shared capability</text>

  <!-- ===================== Bottom Venn: 80% overlap ===================== -->
  <!-- Circles: r = 100, centers (315, 610) and (346, 610). d = 31 ⇒ ~80% overlap. -->
  <text x="360" y="478" text-anchor="middle" class="header">High-performance actuarial (Julia + AD + composable types)</text>

  <circle cx="315" cy="610" r="100" class="actuarial"/>
  <circle cx="346" cy="610" r="100" class="quant"/>

  <!-- Labels outside the circles because the crescents are ~30 px wide -->
  <text x="160" y="616" text-anchor="middle" class="clabel">Actuarial</text>
  <text x="498" y="616" text-anchor="middle" class="clabel">Quant</text>
  <text x="331" y="621" text-anchor="middle" class="percent">80%</text>

  <text x="360" y="746" text-anchor="middle" class="caption">≈ 80% shared capability</text>
</svg>
